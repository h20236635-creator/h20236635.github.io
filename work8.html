<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>작품 설명</title>
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicons/favicon-16x16.png">

  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="theme-color" content="#ffffff">
  
  <style>

    *{
      margin:0;
      padding:0;
      font-family:sans-serif;
      box-sizing:border-box;
    }

    body{
    background:#050505;
    color:white;

    min-height:100vh;

    padding:80px 20px;
    }

    .container{
      width:100%;
      max-width:900px;

      display:flex;
      flex-direction:column;
      align-items:center;

      gap:40px;
      margin:0 auto
    }

    /* 작품 카드 */

    .work-card{

      width:100%;

      background:rgba(255, 255, 255, 0.099);

      border:1px solid rgba(255, 255, 255, 0.189);

      border-radius:28px;

      padding:40px;

      backdrop-filter:blur(14px);

      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    .work-title{

      text-align:center;

      margin-bottom:35px;

      line-height:1.8;
    }

    .work-title h1{
      font-size:2rem;
      font-weight:400;
      margin-bottom:10px;
    }

    .work-title p{
      font-size:1rem;
      color:rgba(255,255,255,0.7);
    }

    /* A5 비율 */

    .work-image{

      width:100%;

      max-width:520px;

      aspect-ratio:148 / 210;

      margin:0 auto;

      overflow:hidden;

      border-radius:4px;

      background:#111;
    }

    .work-image img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* 작품 설명 */

    .description-box{

      width:100%;

      min-height:350px;

      background:rgba(255, 255, 255, 0.099);

      border:1px solid rgba(255, 255, 255, 0.189);

      border-radius:28px;

      padding:40px;

      line-height:2;

      color:rgba(255,255,255,0.82);

      backdrop-filter:blur(14px);

      box-shadow:0 10px 40px rgba(0,0,0,0.35);
    }

    .description-box h2{
      font-size:1.5rem;
      font-weight:400;
      margin-bottom:25px;
      color:white;
    }

    /* footer */

    footer{

    width:100%;

    padding:50px 4%;

    margin-top:60px;

    border-top:1px solid rgba(255,255,255,0.08);

    text-align:right;

    line-height:2;

    color:rgba(255,255,255,0.5);

    font-size:0.95rem;
    }

    @media (max-width:768px){

      .work-card{
        padding:25px;
      }

      .work-title h1{
        font-size:1.6rem;
      }

      .description-box{
        padding:28px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <!-- 작품 카드 -->

    <div class="work-card">

      <div class="work-title">

        <h1>생각의 뿌리</h1>

        <p>
        강예인 (20246603, 디지털인문예술전공)
        </p>

      </div>

      <div class="work-image">

        <img src="images/8. 20246603 강예인.png">

      </div>

    </div>

    <!-- 작품 설명 -->

    <div class="description-box">

      <h2>작품 설명</h2>

      밑으로 자라나는 나무의 뿌리처럼 독서를 하면 생각의 뿌리가 자라나고, 결국 우리를 성장시킨다. 인제 기적의 도서관이 이런 '기적'을 나타냈으면 하는 생각으로 구성하였다.
      

    </div>
  </div>

    <!-- footer -->

    <footer class="footer" style="text-align:right; padding-right:8%;">

      한림대학교 디지털인문예술전공 운영위원회<br><br>

      강원특별자치도 춘천시 한림대학길 1
      일송기념도서관 4층 C.SQUARE<br><br>

      웹사이트 제작/수정 문의
      임지우 (h20236635@glab.hallym.ac.kr)

    </footer>


</body>
</html>
